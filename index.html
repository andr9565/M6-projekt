<!DOCTYPE html>
<html lang="da">
<head>
  <!-- Forside: viser nyeste bøger; `app.js` fylder #book-grid -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brugte Studiebøger</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script>
  const user = localStorage.getItem('loggedInUser');
  if (!user) {
    window.location.replace('login.html');
  } else {
    document.addEventListener('DOMContentLoaded', function() {
      document.getElementById('welcome-title').textContent = 'Velkommen ' + user;
    });
  }
</script>
</head>
<body>
  <div class="page-shell">
    <!-- Sidebar: navigation og hurtigstatus -->
    <aside class="sidebar">
      <h2 class="brand">Brugte Studiebøger</h2>

      <!-- Menu: links til appens hovedsider -->
      <nav class="menu" aria-label="Hovedmenu">
        <a class="menu-item active" href="index.html" aria-current="page">
          <span class="menu-icon" aria-hidden="true">⌂</span>
          <span>Hjem</span>
        </a>
        <a class="menu-item" href="koeb-boeger.html">
          <span class="menu-icon" aria-hidden="true">📖</span>
          <span>Køb bøger</span>
        </a>
        <a class="menu-item" href="saelg-boeger.html">
          <span class="menu-icon" aria-hidden="true">⊕</span>
          <span>Sælg bøger</span>
        </a>
        <a class="menu-item" href="min-bruger.html">
          <span class="menu-icon" aria-hidden="true">◌</span>
          <span>Min bruger</span>
        </a>
      </nav>

      <!-- Logout-knap: klik håndteres i app.js (fjerner loggedInUser) -->
      <a id="logoutBtn" class="menu-item" href="#" style="margin-top:12px;">
        <span class="menu-icon" aria-hidden="true">⇦</span>
        <span>Log ud</span>
      </a> 

      <!-- Status-element: app.js skriver beskeder her -->
      <p class="connection-status" id="status">Klar</p>
    </aside>

    <main class="content">
      <!-- Velkomst-header; `#welcome-title` opdateres fra app.js -->
      <header class="hero">
        <h1 id="welcome-title">Velkommen</h1>
        <p>Find billige studiebøger og sælg dine egne brugte bøger her</p>
      </header>

      <!-- Bog-liste: `#book-grid` fyldes af renderBooks() i app.js -->
      <section>
        <h2 class="section-title">Nyeste bøger til salg</h2>
        <div class="book-grid" id="book-grid"></div>
      </section>
    </main>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
